[env:UnitNFC_NFCA_Detect_Core_Arduino_latest]
extends=Core, option_release, arduino_latest
build_src_filter = +<*> -<.git/> -<.svn/> +<../examples/UnitUnified/NFCA/Detect>
build_flags = ${option_release.build_flags}
  -D USING_UNIT_NFC

