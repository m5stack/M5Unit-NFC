; For CapCC1101 / CapCC1101NFC (SPI, ST25R3916)

; --------------------------------
; UnitTest
; --------------------------------
[env:-----------------------------------------------separator0000]


; CapCC1101 (SPI) - Cardputer only
[env:test_CapCC1101_CardputerADV]
extends=Cardputer, option_release, arduino_latest
build_flags = ${Cardputer.build_flags}
  ${option_release.build_flags}
  -D USING_CAP_CC1101
lib_deps = ${Cardputer.lib_deps}
  ${test_fw.lib_deps}
test_filter= embedded/test_st25r3916

[env:-----------------------------------------------separator000]
; --------------------------------
; Examples
